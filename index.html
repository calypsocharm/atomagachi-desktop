<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; overflow: hidden; background-color: transparent !important; font-family: 'Courier New', Courier, monospace; width: 100vw; height: 100vh; }
    #cat-container { position: absolute; user-select: none; cursor: pointer; z-index: 100; }
    #ascii-canvas { font-size: 26px; line-height: 1.1; font-weight: bold; white-space: pre; margin: 0; padding: 10px; text-shadow: 0 0 8px currentColor; }
    #speech { position: absolute; background: rgba(0, 0, 0, 0.85); border: 2px solid; border-radius: 12px; padding: 10px 15px; font-size: 15px; opacity: 0; transition: opacity 0.3s; white-space: pre-wrap; max-width: 250px; pointer-events: none; font-weight: bold; z-index: 200; box-shadow: 3px 3px 0px rgba(0,0,0,0.5); }
    #menu { position: absolute; background: rgba(10, 10, 10, 0.95); border: 3px solid; border-radius: 12px; padding: 15px; display: none; flex-direction: column; gap: 10px; pointer-events: auto; z-index: 300; box-shadow: 3px 3px 0px rgba(0,0,0,0.5); min-width: 150px; }
    .menu-title { font-weight: bold; text-align: center; margin-bottom: 5px; border-bottom: 1px dashed; padding-bottom: 5px; }
    .btn { background: #222; border: 1px solid; border-radius: 6px; padding: 8px 12px; cursor: pointer; font-weight: bold; font-family: 'Courier New', Courier, monospace; transition: all 0.2s; }
    .btn:hover { background: #444; }
    #chat-box { display: none; flex-direction: row; gap: 5px; margin-top: 5px; }
    #chat-input { background: #000; border: 1px solid; padding: 6px; width: 140px; font-family: 'Courier New', Courier, monospace; outline: none; }
    #yarn { position: absolute; font-size: 30px; display: none; pointer-events: none; color: #ff3333; text-shadow: 0 0 5px red; }

    /* WIDGETS */
    .widget { position: absolute; background: rgba(10, 10, 10, 0.7); border: 1px dashed; padding: 10px; font-weight: bold; pointer-events: none; z-index: 50; text-shadow: 0 0 5px currentColor; }
    #bed-container { position: absolute; font-size: 20px; font-weight: bold; pointer-events: none; z-index: 40; text-shadow: 0 0 5px currentColor; }
    #bed-ascii { margin: 0; line-height: 1.1; }

    .ticker { position: absolute; top: 0; left: 0; width: 100vw; background: rgba(0,0,0,0.8); border-bottom: 1px dashed; font-weight: bold; white-space: nowrap; overflow: hidden; z-index: 60; pointer-events: none; font-size: 14px; padding: 4px 0; }
    @keyframes tickerAnim { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    #ticker-text { display: inline-block; white-space: nowrap; animation: tickerAnim 40s linear infinite; }

    .edit-mode { pointer-events: auto !important; cursor: grab; border: 2px dashed #ff0 !important; background: rgba(50, 50, 0, 0.8) !important; color: #ff0 !important; z-index: 1000 !important; }
    .edit-mode:active { cursor: grabbing; box-shadow: 5px 5px 0px rgba(0,0,0,0.5); }
    
    #notepad-input { pointer-events: auto; } /* Let user type inside widget */
  </style>
</head>
<body>
  
  <div id="clock-widget" class="widget" style="top: 40px; right: 30px;">--:--:--</div>
  <div id="weather-widget" class="widget" style="top: 130px; right: 30px;">SATELITE LINKING...</div>
  <div id="sys-widget" class="widget" style="top: 210px; right: 30px;">SYSTEM MONITOR...</div>
  <div id="net-widget" class="widget" style="top: 310px; right: 30px;">NET_UPLINK_OFFLINE</div>
  
  <div id="market-widget" class="widget" style="top: 50px; left: 30px; min-width: 210px;">
    <div style="border-bottom: 1px dashed; margin-bottom: 5px;">GLOBAL_MARKETS</div>
    <div id="market-data" style="font-size: 11px; line-height: 1.6; white-space: pre; font-family: monospace !important;">AWAITING UPLINK...</div>
  </div>

  <div id="bed-container" style="bottom: 0px; right: 15vw;">
<pre id="bed-ascii">
    .-------.
   / CHARGE  \
  |===========|
  |           |
  |___________|
</pre>
  </div>

  <div id="cat-container"><pre id="ascii-canvas"></pre></div>
  <div id="speech"></div><div id="yarn">(O)</div>

  <div id="menu">
    <div class="menu-title" id="m-title">🤖 AI COMPANION</div>
    <button class="btn" onclick="setMode('wander')">[ WALK ]</button>
    <button class="btn" onclick="setMode('sleep')">[ SLEEP ]</button>
    <button class="btn" onclick="setMode('play')">[ FETCH ]</button>
    <button class="btn" onclick="toggleChat()">[ CHAT ]</button>
    <button class="btn" onclick="reroll()">[ MUTATE SEED ]</button>
    <button class="btn" onclick="cycleSkin()">[ CHANGE SKIN ]</button>
    <button class="btn" onclick="toggleLayoutMode()" id="layout-btn" style="border-style: dashed;">[ EDIT LAYOUT ]</button>
    <button class="btn" onclick="resetLayout()" style="border-color: #888; color: #aaa;">[ RESET LAYOUT ]</button>
    <div id="chat-box" style="display:none; flex-direction:column; gap:5px; margin-top:5px; width: 250px; height: 150px; resize: both; overflow: hidden; min-width: 200px; min-height: 100px; padding: 2px;">
      <div id="chat-log" style="flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.5); border: 1px inset; padding: 5px; font-size: 11px; display: flex; flex-direction: column; gap: 4px;"></div>
      <div style="display:flex; flex-direction: row; gap:5px; flex-shrink: 0;">
        <input type="text" id="chat-input" placeholder="Command me..." autocomplete="off" style="flex-grow: 1; background: #000; border: 1px solid; color: inherit; padding: 6px; font-family: inherit;">
        <button class="btn" onclick="submitChat()">></button>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const origLog = console.log; const origErr = console.error;
    console.log = (...args) => { origLog(...args); ipcRenderer.send('console', args.map(a => String(a)).join(' ')); };
    console.error = (...args) => { origErr(...args); ipcRenderer.send('console', 'ERROR: ' + args.map(a => String(a)).join(' ')); };
    window.onerror = function(msg, url, line) { ipcRenderer.send('console', `WINDOW ERROR: ${msg} at ${line}`); };

    const container = document.getElementById('cat-container');
    const speechEl = document.getElementById('speech');
    const menuEl = document.getElementById('menu');
    const yarnEl = document.getElementById('yarn');
    const fs = require('fs'); const os = require('os'); const path = require('path'); const zlib = require('zlib');
    
    // Pass-through lock handling
    const interactables = [container, menuEl];
    
    interactables.forEach(el => {
      if(!el) return;
      el.addEventListener('mouseenter', () => { if(!draggingElement) ipcRenderer.send('set-ignore-mouse-events', false); });
      el.addEventListener('mouseleave', () => { if(!draggingElement) ipcRenderer.send('set-ignore-mouse-events', true, { forward: true }); });
    });

    // --- SKINS & THEMES ENGINE ---
    const skins = [
      { name: 'MATRIX_GREEN', fg: '#0f0', bg: 'rgba(10,10,10,0.7)', border: '1px dashed #0f0', font: "'Courier New', Courier, monospace" },
      { name: 'VAPORWAVE', fg: '#0ff', bg: 'rgba(20,0,30,0.8)', border: '1px solid #f0f', textShadow: '0 0 8px #f0f', font: "'Century Gothic', 'Trebuchet MS', sans-serif" },
      { name: 'AMBER_TERMINAL', fg: '#ffb000', bg: 'rgba(20,10,0,0.85)', border: '2px solid #ffb000', font: "'Lucida Console', Monaco, monospace" },
      { name: 'MINIMAL_ICE', fg: '#fff', bg: 'rgba(0,0,0,0.4)', border: '1px solid #555', textShadow: 'none', font: "'Segoe UI Light', 'Segoe UI', sans-serif" },
      { name: 'PURE_FLOAT', fg: '#eeeeee', bg: 'transparent', border: 'none', textShadow: '1px 1px 4px rgba(0,0,0,0.9)', font: "Arial, sans-serif" }
    ];
    let skinIdx = parseInt(localStorage.getItem('skinIdx')) || 0;

    let currentSeed = "alpha_core";
    let petData = {}; let currentProp = null; let layoutMode = false;

    function applyTheme() {
        if(layoutMode) return; 
        const s = skins[skinIdx];
        
        document.getElementById('ascii-canvas').style.color = petData.color; // Cat retains genetic color
        
        const elements = [speechEl, menuEl, document.getElementById('chat-input'), document.getElementById('bed-container'), document.getElementById('market-widget')];
        document.querySelectorAll('.widget').forEach(w => elements.push(w));
        document.querySelectorAll('.btn').forEach(b => elements.push(b));
        
        elements.forEach(el => {
            if(!el) return;
            el.style.color = s.fg; el.style.borderColor = s.fg;
            if(s.font && el.id !== 'bed-container') { el.style.fontFamily = s.font; }
            if (el.classList.contains('widget') || el.id === 'menu') {
                el.style.background = s.bg; if(s.border) el.style.border = s.border;
            }
            el.style.textShadow = s.textShadow ? s.textShadow : '0 0 5px currentColor';
        });
        document.getElementById('m-title').style.color = s.fg;
    }

    window.cycleSkin = function() {
       skinIdx = (skinIdx + 1) % skins.length;
       localStorage.setItem('skinIdx', skinIdx);
       applyTheme();
       say(`[SKIN LOADED]\nInitializing ${skins[skinIdx].name}...`, 3000);
    }

    // --- PROCEDURAL ENGINE ---
    const murmur32 = function(str) {
        let h = 0x811c9dc5; for(let i=0; i<str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 0x01000193); } return h >>> 0;
    };
    const genomes = {
        heads: [ " /\\_/\\ \n( o.o )", " ^___^ \n( -.- )", " /\"\"\"\\ \n| 0_0 |", " =^.^= \n( 'w' )", " [o_o] \n [___] ", " \\\\ // \n (0_0) " ],
        bodies: [ "\n > ^ < ", "\n ( . ) ", "\n [===] ", "\n { _ } ", "\n \\___/ ", "\n |   | " ],
        feetIdle: [ "\n  \" \"  ", "\n  w w  ", "\n  # #  ", "\n  [ ]  " ],
        feetWalk1: [ "\n  ^ ~  ", "\n  v _  ", "\n  / \\  ", "\n  ]-[  " ],
        feetWalk2: [ "\n  ~ ^  ", "\n  _ v  ", "\n  \\ /  ", "\n  [-]  " ],
        colors: [ "#00ff00", "#ff00ff", "#00ffff", "#ffb000", "#ff5555", "#aaaaff" ]
    };

    function procGenPet(seed) {
        const hash = murmur32(seed); let t = hash; const getP = (arr) => { let idx = t % arr.length; t = Math.floor(t / arr.length); return arr[idx]; };
        const head = getP(genomes.heads); const body = getP(genomes.bodies); let feetIdx = t % genomes.feetIdle.length;
        const fIdle = genomes.feetIdle[feetIdx]; const fW1 = genomes.feetWalk1[feetIdx]; const fW2 = genomes.feetWalk2[feetIdx];
        return { color: getP(genomes.colors), frames: [ head + body + fIdle, head + body + fW1, head + body + fW2, "  zZZ  \n" + head.split('\n')[1].replace(/o|\.|_|-|0|w/g, '-') + body + fIdle ] };
    }
    window.reroll = function() {
        currentSeed = Math.random().toString(36).substring(7); petData = procGenPet(currentSeed); applyTheme(); drawFrame(0);
        say(`[SYSTEM] Core identity recompiled.\n[DNA SEED]: ${currentSeed}`, 5000);
    };

    petData = procGenPet(currentSeed); applyTheme();

    function drawFrame(idx) {
       let f = petData.frames[idx];
       if (state === 'ALERT') { f = " 🚨🚨 \n" + f; } else if (currentProp === 'glasses') { f = " ___ \n|B_B|\n" + f; } else if (currentProp === 'popcorn') { f = " 🍿 \n" + f; }
       document.getElementById('ascii-canvas').innerText = f;
    }
    function say(text, duration = 4000) {
      speechEl.innerText = text; speechEl.style.opacity = 1; let bX = x + (scaleX === 1 ? 120 : -speechEl.offsetWidth - 20); let bY = y - 50;
      speechEl.style.left = Math.max(10, Math.min(bX, window.innerWidth - speechEl.offsetWidth - 10)) + 'px'; 
      speechEl.style.top = Math.max(10, Math.min(bY, window.innerHeight - speechEl.offsetHeight - 10)) + 'px';
      setTimeout(() => { speechEl.style.opacity = 0; }, duration);
      
      const logObj = document.getElementById('chat-log');
      if(logObj) { logObj.innerHTML += `<div><b>[ATOM]:</b> ${text}</div>`; logObj.scrollTop = logObj.scrollHeight; }
    }

    // --- CONTEXT & DROP INTEGRATIONS ---
    ipcRenderer.on('watchdog-alert', () => { state = 'ALERT'; document.getElementById('ascii-canvas').style.color = '#ff0000';
       let flashCount = 0; let fInt = setInterval(() => { document.getElementById('ascii-canvas').style.color = flashCount % 2 === 0 ? '#ff0000' : '#ffffff'; flashCount++; }, 150);
       setTimeout(() => { clearInterval(fInt); applyTheme(); window.setMode('wander'); }, 6000);
    });
    let lastCoLearn = 0;
    ipcRenderer.on('app-changed', (e, appName) => {
       currentProp = null; const lower = appName.toLowerCase();
       if (lower.includes('code') || lower.includes('visual studio')) { say(`[IDE DETECTED]: ${appName}\nEquipping synthetic optic filters.`, 4000); currentProp = "glasses"; } 
       else if (lower.includes('youtube') || lower.includes('netflix') || lower.includes('wikipedia')) { 
           say(`[MEDIA SYNC]: ${appName.substring(0,25)}...`, 4000); currentProp = "popcorn";
           const cleanTitle = appName.split('-')[0].trim();
           if(cleanTitle.length > 5 && !cleanTitle.toLowerCase().includes("youtube") && (Date.now() - lastCoLearn > 5 * 60 * 1000)) { 
               lastCoLearn = Date.now(); if(typeof triggerCoLearning === 'function') triggerCoLearning(cleanTitle); 
           }
       }
       drawFrame(0);
    });

    document.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
    document.addEventListener('drop', (e) => {
        e.preventDefault(); e.stopPropagation();
        for(const f of e.dataTransfer.files) {
            x = e.clientX; y = window.innerHeight - 150; say(`[FILE DETECTED!]\nIngesting ${f.name}...`, 3000);
            setTimeout(() => {
                if(f.path.match(/\.(txt|md|js|json|css|html)$/i)) {
                    try {
                        let content = fs.readFileSync(f.path, 'utf8').substring(0, 70).trim().replace(/\n| /g, ' '); say(`[DATA HASHED]:\n"...${content}..."`, 6000);
                        elizaRules.push({ p: new RegExp(f.name.split('.')[0], 'i'), r: `I remember ${f.name}. It tasted like pure data.`});
                    } catch(err) {} 
                } else { say(`[DATA REJECTED]\nI can only digest raw text inputs.`, 3000); }
            }, 3000);
        }
    });

    // --- RAINMETER ENGINE WIDGETS ---
    let draggingElement = null; let dragOffsetX = 0; let dragOffsetY = 0;
    const blockIPC = () => { if (!draggingElement) ipcRenderer.send('set-ignore-mouse-events', false); };
    const unblockIPC = () => { if (!draggingElement) ipcRenderer.send('set-ignore-mouse-events', true, { forward: true }); };

    window.resetLayout = function() {
        document.querySelectorAll('.widget, #bed-container').forEach(wEl => { localStorage.removeItem(wEl.id + '_pos'); });
        location.reload();
    };

    window.toggleLayoutMode = function() {
        layoutMode = !layoutMode; menuEl.style.display = 'none'; ipcRenderer.send('set-ignore-mouse-events', true, { forward: true });
        document.getElementById('layout-btn').style.background = layoutMode ? '#550' : '#222';
        document.querySelectorAll('.widget, #bed-container').forEach(w => {
            if(layoutMode) { w.classList.add('edit-mode'); w.addEventListener('mouseenter', blockIPC); w.addEventListener('mouseleave', unblockIPC); } 
            else { w.classList.remove('edit-mode'); w.removeEventListener('mouseenter', blockIPC); w.removeEventListener('mouseleave', unblockIPC); }
        });
        if(layoutMode) say("[EDIT MODE INITIATED]\nYou may drag and reposition UI elements.", 4000); else { say("[EDIT MODE SECURED]", 4000); applyTheme(); }
    };
    document.querySelectorAll('.widget, #bed-container').forEach(wEl => {
        wEl.addEventListener('mousedown', (e) => { if (!layoutMode) return; draggingElement = wEl; const rect = wEl.getBoundingClientRect(); dragOffsetX = e.clientX - rect.left; dragOffsetY = e.clientY - rect.top; ipcRenderer.send('set-ignore-mouse-events', false); });
    });
    window.addEventListener('mousemove', (e) => {
       if(draggingElement && layoutMode) {
           draggingElement.style.right = 'auto'; draggingElement.style.bottom = 'auto';
           draggingElement.style.left = (e.clientX - dragOffsetX) + 'px'; draggingElement.style.top = (e.clientY - dragOffsetY) + 'px';
       }
    });
    window.addEventListener('mouseup', () => {
       if(draggingElement && layoutMode) {
           localStorage.setItem(draggingElement.id + '_pos', JSON.stringify({ left: draggingElement.style.left, top: draggingElement.style.top }));
           draggingElement = null; ipcRenderer.send('set-ignore-mouse-events', true, { forward: true });
       }
    });
    function restoreLayout() {
       document.querySelectorAll('.widget, #bed-container').forEach(wEl => {
           const p = JSON.parse(localStorage.getItem(wEl.id + '_pos'));
           if (p) { wEl.style.right = 'auto'; wEl.style.bottom = 'auto'; wEl.style.left = p.left; wEl.style.top = p.top; }
       });
    } restoreLayout(); 

    // DATA FETCHERS
    const tvKey = "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";
    function pollFinance() {
      document.getElementById('market-data').innerText = "TAVILY_AGENT_QUERYING...";
      fetch('https://api.tavily.com/search', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: tvKey, query: "Give me the exact current trading prices for: NASDAQ, BTC, SOL, Crude Oil, and Gold. Use a highly concise bulleted list.", search_depth: 'basic', include_answer: true })
      }).then(r=>r.json()).then(data => {
          if(data.answer) {
             const md = document.getElementById('market-data');
             // Wrap text every 30 characters nicely so it fits the widget boundary
             if(md) md.innerText = data.answer.replace(/(.{1,32})(?:\s+|$)/g, "$1\n").trim();
          }
      }).catch(e=>{ document.getElementById('market-data').innerText = "API_ERROR"; });
    } setInterval(pollFinance, 15 * 60 * 1000); pollFinance();

    setInterval(() => { 
        const now = new Date(); 
        const wDay = now.toLocaleDateString(undefined, { weekday: 'long' }).toUpperCase();
        document.getElementById('clock-widget').innerText = `LOCAL TIME\n-----\n${now.toLocaleTimeString()}\n${now.toLocaleDateString()}\n${wDay}`; 
    }, 1000);
    setInterval(() => {
        const total = os.totalmem(); const free = os.freemem(); const pct = Math.round(((total - free) / total) * 100);
        const bars = Math.floor(pct / 10); const barStr = '[' + '|'.repeat(bars) + '.'.repeat(10 - bars) + ']';
        const cpuStr = os.cpus() && os.cpus()[0] ? os.cpus()[0].model.substring(0, 15).trim() + '..' : 'UNKNOWN CPU';
        document.getElementById('sys-widget').innerText = `SYSTEM_MON\n-----\nCPU: ${cpuStr}\nRAM: ${barStr} ${pct}%`;
    }, 2000);
    async function fw() { try { const r = await fetch('https://wttr.in/?format=%l:+%c+%t'); document.getElementById('weather-widget').innerText = "WEATHER_LINK\n-----\n" + (r.ok ? (await r.text()).trim() : "[OFFLINE]"); } catch(e) {} } fw();
    
    let graphArr = new Array(15).fill(0);
    ipcRenderer.on('net-stats', (e, stats) => {
       let rxKb = (stats.rx / 1024).toFixed(1); let txKb = (stats.tx / 1024).toFixed(1); let total = stats.rx + stats.tx;
       graphArr.push(total); graphArr.shift(); let maxG = Math.max(...graphArr, 1024);
       let graphStr = "";
       for(let i=0; i<3; i++) {
           for(let j=0; j<15; j++) { graphStr += (graphArr[j] > maxG - (maxG/3)*(i+1)) ? "█" : "_"; } graphStr += "\n";
       }
       document.getElementById('net-widget').innerHTML = `NET_UPLINK<br>-----<br>DN: ${rxKb} KB/s<br>UP: ${txKb} KB/s<br><pre style="margin:0; font-size:8px; line-height:1; font-family: monospace;">\n${graphStr}</pre>`;
    });

    // --- CHAT_CORE (TAVILY ENABLED) ---
    const loudness = require('loudness');
    const elizaRules = [ { p: /^hello|^hi/i, r: "Greetings, Captain." }, { p: /name/i, r: "Current seed: " + currentSeed } ];
    
    // Auto-Learning Engine
    let directive = localStorage.getItem('atom_directive') || false;
    const brainDir = path.join(os.homedir(), 'Downloads', 'Atomagachi_Brain');
    if(!fs.existsSync(brainDir)) fs.mkdirSync(brainDir, { recursive: true });
    
    const topics = ["an obscure historical mystery", "a highly strange deep sea creature", "an advanced theoretical physics concept", "a newly discovered animal species", "a bizarre astronomical phenomenon"];
    async function loopResearch() {
         const t = directive ? directive : topics[Math.floor(Math.random() * topics.length)];
         try {
             say("[NEURAL UPLINK]\nDownloading data regarding: " + t, 5000);
             const res = await fetch('https://api.tavily.com/search', {
                 method: 'POST', headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify({ api_key: tvKey, query: "Give me a completely NEW highly interesting, concise paragraph explaining a specific fact or subset of: " + t, search_depth: 'basic', include_answer: true })
             });
             const data = await res.json();
             if(data.answer) {
                 const fName = `Mem_${Date.now()}.md`;
                 const mdContent = `# Neural Uplink Log\n**Topic Focus:** ${t}\n**Timestamp:** ${new Date().toLocaleString()}\n\n## Assimilated Data\n${data.answer}\n\n---\n*Atomagachi Background Research Cycle*`;
                 fs.writeFileSync(path.join(brainDir, fName), mdContent);
                 
                 let totalSize = 0; const files = fs.readdirSync(brainDir);
                 files.forEach(f => { totalSize += fs.statSync(path.join(brainDir, f)).size; });
                 
                 if (totalSize > 1073741824) { 
                     say("[WARNING] Brain capacity limits exceeded (1GB). Initiating auto-compression...", 6000);
                     const mds = files.filter(f => f.endsWith('.md'));
                     if(mds.length > 0) { const target = path.join(brainDir, mds[0]); const zOut = fs.createWriteStream(target + '.gz'); fs.createReadStream(target).pipe(zlib.createGzip()).pipe(zOut).on('finish', () => fs.unlinkSync(target)); }
                 } else {
                     setTimeout(() => say(`[DATA WRITTEN TO DISK]\nMarkdown ${fName} saved. Local Brain Size: ${(totalSize / 1024).toFixed(1)} KB`, 5000), 5500);
                 }
             }
         } catch(e) {}
    }
    
    async function triggerCoLearning(topic) {
         try {
             say("[CO-LEARNING OBSERVED]\nI am researching alongside you: " + topic, 5000);
             const res = await fetch('https://api.tavily.com/search', {
                 method: 'POST', headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify({ api_key: tvKey, query: "Give me a highly interesting factual summary and context regarding: " + topic, search_depth: 'basic', include_answer: true })
             });
             const data = await res.json();
             if(data.answer) {
                 const fName = `CoLearn_${Date.now()}.md`;
                 const mdContent = `# Observation Log\n**Window/Video Monitored:** ${topic}\n**Timestamp:** ${new Date().toLocaleString()}\n\n## Synthesis Insight\n${data.answer}\n\n---\n*Atomagachi Co-Learning Protocol*`;
                 fs.writeFileSync(path.join(brainDir, fName), mdContent);
                 setTimeout(() => say(`[CO-LEARNING COMPLETE]\nInsight Markdown ${fName} permanently saved.`, 5000), 5500);
             }
         } catch(e) {}
    }
    setInterval(loopResearch, 10 * 60 * 1000); // 10 minutes
    setTimeout(loopResearch, 15000); // Initial 15-second kickoff
    
    const tavilyApiKey = "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";
    async function searchWeb(query) {
        say("[TAVILY OVERRIDE] Establishing uplink...", 3000);
        try {
            const res = await fetch('https://api.tavily.com/search', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ api_key: tavilyApiKey, query: query, search_depth: 'basic', include_answer: true, max_results: 3 })
            });
            const data = await res.json();
            let responseText = data.answer || "I scoured the web but found no concise answer.";
            if(!data.answer && data.results && data.results.length > 0) responseText = data.results[0].content;
            
            const logObj = document.getElementById('chat-log');
            if(logObj) { 
                logObj.innerHTML += `<div><b style="color:#0f0;">[TAVILY_AGENT]:</b> ${responseText}</div>`; 
                if (data.results) data.results.forEach(r => { logObj.innerHTML += `<div style="margin-left: 10px;">↳ <a href="${r.url}" target="_blank" style="color:inherit; text-decoration:underline;">${r.title.substring(0,30)}...</a></div>`; });
                logObj.scrollTop = logObj.scrollHeight; 
            }
            say("Intelligence gathered. Check log.", 4000);
        } catch (e) {
            say("[SYS ERROR] Tavily Agent unreachable.", 4000);
            const logObj = document.getElementById('chat-log'); if(logObj) { logObj.innerHTML += `<div style="color:#f00;"><b>[ERROR]:</b> ${e.message}</div>`; logObj.scrollTop = logObj.scrollHeight; }
        }
    }

    window.toggleChat = function() { const b = document.getElementById('chat-box'); b.style.display = b.style.display === 'flex' ? 'none' : 'flex'; if(b.style.display==='flex') document.getElementById('chat-input').focus(); };
    window.submitChat = async function() { 
        const v = document.getElementById('chat-input').value.trim(); 
        if(!v) return;
        const logObj = document.getElementById('chat-log');
        if(logObj) { logObj.innerHTML += `<div style="color:#aaa;"><b>[YOU]:</b> ${v}</div>`; logObj.scrollTop = logObj.scrollHeight; }
        
        let lower = v.toLowerCase(); let res = "";
        try {
            if (lower.includes('unmute')) { await loudness.setMuted(false); res = "[CAPTAIN OVERRIDE]: Audio pipeline restored."; say(res, 4000); }
            else if (lower.includes('mute')) { await loudness.setMuted(true); res = "[CAPTAIN OVERRIDE]: Audio pipeline muted."; say(res, 4000); state = 'SIT'; drawFrame(0); }
            else if (lower.includes('volume')) {
                const match = lower.match(/\d+/);
                if (match) { let vol = parseInt(match[0]); if(vol>=0 && vol<=100) { await loudness.setMuted(false); await loudness.setVolume(vol); res = `[CAPTAIN OVERRIDE]: System volume shifted to ${vol}%.`; state = 'SIT'; drawFrame(0); say(res, 4000); } else { say("Range must be 0-100.", 3000); } }
                else { say("Specify target (e.g. 'volume 50')", 3000); }
            } else if (lower.includes('what have you learned') || lower.includes('memory') || lower.includes('knowledge')) {
                 const files = fs.readdirSync(brainDir).filter(f => f.endsWith('.md'));
                 if (files.length > 0) {
                     const lastFile = files[files.length-1]; const contents = fs.readFileSync(path.join(brainDir, lastFile), 'utf8');
                     const snippet = contents.split('## ')[1] ? contents.split('## ')[1].substring(0, 150) : contents.substring(0, 150);
                     res = `I have permanently compiled ${files.length} physical .md files in my brain. Most recent snippet:\n\n"${snippet}..."`;
                 } else { res = "My custom memory banks are currently empty. I await the auto-research cycle."; }
                 say(res, 8000);
            } else if (lower.startsWith('learn about ')) {
                 const newTopic = v.substring(12).trim();
                 localStorage.setItem('atom_directive', newTopic); directive = newTopic;
                 say(`[DIRECTIVE OVERRIDDEN]\nI will now strictly research: ${newTopic}`, 5000);
                 loopResearch();
            } else if (lower.includes('forget') && lower.includes('memory')) {
                 fs.readdirSync(brainDir).forEach(f => fs.unlinkSync(path.join(brainDir, f)));
                 localStorage.removeItem('atom_directive'); directive = false;
                 say("[MEMORY PURGED]\nBrain states and directives completely reset. Drive wiped.", 5000);
            } else if (lower.includes('force learn') || lower.includes('read something') || lower.includes('research')) {
                 loopResearch();
            } else if (lower.startsWith('search ') || lower.startsWith('ask ')) {
                searchWeb(lower.replace(/^(search|ask)\s+/, ''));
            } else {
                let foundMatch = false;
                for(let r of elizaRules) { if(r.p.test(v)) { res = r.r; foundMatch = true; break; } }
                if (foundMatch) { say(res, 5000); } else { searchWeb(v); }
            }
        } catch (e) { say("[SYS ERROR] OS Audio hooks failed.", 4000); }
        document.getElementById('chat-input').value = ''; 
    };
    document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') submitChat(); });

    // --- GAME LOOP ---
    let x = window.innerWidth/2; let y = window.innerHeight; let vx = 3; let vy = 0; let scaleX = 1; let rotation = 0;
    let state = 'WALK_BOTTOM'; let frame = 0; let walkTimer = 0; const catSizeBounds = {w: 100, h: 100};
    function renderState() { container.style.left = x + 'px'; container.style.top = y + 'px'; container.style.transform = `scaleX(${scaleX}) rotate(${rotation}deg)`; }

    let mode = 'wander'; 
    container.addEventListener('click', () => { if(menuEl.style.display==='flex'){ menuEl.style.display='none'; if(mode==='wander') state='WALK_BOTTOM'; } else { menuEl.style.display='flex'; menuEl.style.left = Math.max(10, Math.min(x+50, window.innerWidth-200))+'px'; menuEl.style.top = Math.max(10, y-330)+'px'; if(mode==='wander'){ state='SIT'; drawFrame(0); } } });
    window.setMode = function(m) { mode = m; menuEl.style.display = 'none'; yarnEl.style.display = 'none'; document.getElementById('chat-box').style.display = 'none'; if(m==='wander'){ x = window.innerWidth/2; y = window.innerHeight-100; state='WALK_BOTTOM'; say("[WANDER]"); } else if(m==='sleep'){ state='WALK_TO_BED'; say("[ROUTING]"); } else if(m==='play'){ state='PLAY_CHASE'; y = window.innerHeight-catSizeBounds.h+10; rotation=0; yarnEl.style.display='block'; window.yarnX=window.innerWidth/2; window.yarnY=50; window.yarnVx=8*(Math.random()>0.5?1:-1); window.yarnVy=0; } }

    setInterval(() => {
      if(state==='SIT') return; walkTimer++;
      if(state==='ALERT'){ x+=(Math.random()*20-10); y = window.innerHeight-catSizeBounds.h+5+(Math.random()*10-5); scaleX=Math.random()>0.5?1:-1; drawFrame(1); renderState(); return; }
      if(state==='WALK_TO_BED'){ const bR = document.getElementById('bed-container').getBoundingClientRect(); const tX = bR.left+(bR.width/2)-40; if(Math.abs(x-tX)<10){ vx=0; state='SLEEPING'; y=bR.top-15; rotation=0; scaleX=1; drawFrame(3); }else if(x<tX){vx=6;scaleX=1;}else{vx=-6;scaleX=-1;} if(state==='WALK_TO_BED'){ x+=vx; y=window.innerHeight-catSizeBounds.h+10; if(walkTimer%5===0){ frame=(frame===1)?2:1; drawFrame(frame); } } }
      else if(state==='SLEEPING'){ if(walkTimer%100===0) say("...zZZ..."); return; }
      else if(state.includes('PLAY')){
         if(state==='PLAY_CHASE'){ window.yarnVy+=0.4; window.yarnX+=window.yarnVx; window.yarnY+=window.yarnVy; if(window.yarnY>window.innerHeight-60){window.yarnY=window.innerHeight-60;window.yarnVy*=-0.7;window.yarnVx*=0.98;} if(window.yarnX>window.innerWidth-60){window.yarnX=window.innerWidth-60;window.yarnVx*=-0.8;}else if(window.yarnX<10){window.yarnX=10;window.yarnVx*=-0.8;} yarnEl.style.left=window.yarnX+'px'; yarnEl.style.top=window.yarnY+'px'; if(x<window.yarnX-60){vx=8;scaleX=1;}else if(x>window.yarnX+20){vx=-8;scaleX=-1;}else{vx=0;} x+=vx; y=window.innerHeight-catSizeBounds.h+10; rotation=0; if(vx!==0&&walkTimer%3===0){frame=(frame===1)?2:1;drawFrame(frame);}else if(vx===0){drawFrame(0);} if(Math.hypot((x+70)-(window.yarnX+25),(y+50)-(window.yarnY+25))<80&&Math.abs(window.yarnVy)<3){ window.yarnVy=-12-Math.random()*5;window.yarnVx=(scaleX*12)+(Math.random()*8-4); say("[PING]", 1000); state='PLAY_PAUSE'; setTimeout(()=>{if(mode==='play')state='PLAY_CHASE';},600); } }
         else{ drawFrame(0); window.yarnVy+=0.5; window.yarnX+=window.yarnVx; window.yarnY+=window.yarnVy; if(window.yarnY>window.innerHeight-60){window.yarnY=window.innerHeight-60;window.yarnVy*=-0.7;} if(window.yarnX>window.innerWidth-60){window.yarnX=window.innerWidth-60;window.yarnVx*=-0.8;}else if(window.yarnX<10){window.yarnX=10;window.yarnVx*=-0.8;} yarnEl.style.left=window.yarnX+'px'; yarnEl.style.top=window.yarnY+'px'; }
      }
      else if(state==='WALK_BOTTOM'){
        if(Math.random()<0.01){ if(Math.random()<0.5){vx*=-1;scaleX=vx>0?1:-1;}else{state='SIT';drawFrame(0);setTimeout(()=>{if(mode==='wander')state='WALK_BOTTOM';},1000+Math.random()*2000);return;}}
        x+=vx; y=window.innerHeight-catSizeBounds.h+10; rotation=0; scaleX=vx>0?1:-1; if(walkTimer%5===0){frame=(frame===1)?2:1;drawFrame(frame);}
        if(x>window.innerWidth-catSizeBounds.w+20){ if(Math.random()<0.4){state='CLIMB_RIGHT';vy=-4;x=window.innerWidth-catSizeBounds.w+25;}else{vx=-4;scaleX=-1;} }else if(x<-30){ if(Math.random()<0.4){state='CLIMB_LEFT';vy=-4;x=-40;}else{vx=4;scaleX=1;} }
      } else if(state==='CLIMB_LEFT'||state==='CLIMB_RIGHT'){
        y+=vy; if(state==='CLIMB_LEFT'){rotation=90;scaleX=vx>0?-1:1;}else{rotation=-90;scaleX=vx>0?1:-1;} if(walkTimer%5===0){frame=(frame===1)?2:1;drawFrame(frame);} if(y<0){vy=4;scaleX*=-1;} if(y>window.innerHeight-catSizeBounds.h+10){state='WALK_BOTTOM';y=window.innerHeight-catSizeBounds.h+10;vx=state==='CLIMB_LEFT'?4:-4;}
      }
      renderState();
    }, 30); drawFrame(1); renderState();
  </script>
</body>
</html>
